# NGINX Configuration for Forum API

limit_req_zone $binary_remote_addr zone=one:10m rate=90r/m;

server {
    listen 80;
    server_name your-domain.com; # Replace with your domain/subdomain

    location /threads {
        limit_req zone=one burst=10 nodelay;
        proxy_pass http://localhost:5000; # Assuming app runs on 5000
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # HTTPS configuration (managed by Certbot usually, but here's a template)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
}
