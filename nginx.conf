# NGINX Configuration for Forum API - Limit Access Implementation

# Mendefinisikan zona limitasi berdasarkan alamat IP (binary_remote_addr)
# rate=90r/m berarti maksimal 90 request per menit
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=90r/m;

server {
    listen 80;
    server_name _; # Ganti dengan domain Anda jika ada

    # Forwarding headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Menerapkan Limit Access pada rute /threads
    location /threads {
        # burst=10 berarti mengizinkan lonjakan 10 request tambahan
        # nodelay berarti request yang masuk dalam batas burst langsung diproses tanpa antrian
        limit_req zone=api_limit burst=10 nodelay;
        
        # Mengembalikan status code 429 saat melewati batas
        limit_req_status 429;

        # Forward request ke Node.js app
        proxy_pass http://localhost:5000;
    }

    # Rute lainnya (tanpa limit atau sesuai kebutuhan)
    location / {
        proxy_pass http://localhost:5000;
    }

    # Error page custom untuk 429 (Opsional)
    error_page 429 /429.json;
    location = /429.json {
        return 429 '{"status":"fail","message":"Terlalu banyak permintaan, silakan coba lagi nanti"}';
        add_header Content-Type application/json;
    }
}