name: Continuous Integration and Deployment

on:
  push:
    branches:
      - master
      - main
      - dev
  pull_request:
    branches:
      - master
      - main
      - dev

jobs:
  test_and_lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_db_password
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run migrations
        run: npm run migrate:up
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGUSER: test_user
          PGDATABASE: forumapi_test
          PGPASSWORD: test_db_password
          PGPORT: 5432

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGUSER: test_user
          PGDATABASE: forumapi_test
          PGPASSWORD: test_db_password
          PGPORT: 5432
          ACCESS_TOKEN_KEY: ${{ secrets.ACCESS_TOKEN_KEY || 'ci_test_access_key' }}
          REFRESH_TOKEN_KEY: ${{ secrets.REFRESH_TOKEN_KEY || 'ci_test_refresh_key' }}
          ACCESS_TOKEN_AGE: 3600

  deploy:
    needs: test_and_lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy to Leapcell
        run: |
          echo "Deploying to production server..."
          # Anda bisa menggunakan Leapcell CLI di sini jika sudah disiapkan
          # Untuk saat ini, ini merepresentasikan jalur deployment yang sukses
