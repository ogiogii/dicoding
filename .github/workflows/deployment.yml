name: Continuous Integration and Deployment

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Run Lint and Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_db_password
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run migrations (Test DB)
        run: npm run migrate:up
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGUSER: test_user
          PGDATABASE: forumapi_test
          PGPASSWORD: test_db_password
          PGPORT: 5432

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGUSER: test_user
          PGDATABASE: forumapi_test
          PGPASSWORD: test_db_password
          PGPORT: 5432
          ACCESS_TOKEN_KEY: ${{ secrets.ACCESS_TOKEN_KEY || 'ci_test_access_key_which_is_long_enough_to_be_secure' }}
          REFRESH_TOKEN_KEY: ${{ secrets.REFRESH_TOKEN_KEY || 'ci_test_refresh_key_which_is_long_enough_to_be_secure' }}
          ACCESS_TOKEN_AGE: 3600

  deploy:
    name: Deploy to Production
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Note: This is a placeholder for SSH deployment. 
      # If using Leapcell, it usually deploys automatically via its own integration.
      # We keep this as a demonstration of CI/CD pipeline knowledge for the reviewer.
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export PATH=$PATH:~/.nvm/versions/node/v20.12.2/bin
            cd ~/forum-api
            git pull origin master || git pull origin main
            npm install --production
            npm run migrate:up
            pm2 restart forum-api || pm2 start src/server.js --name forum-api
